name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  packages: write

jobs:

  build-backend:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build ./backend --tag deeplx-web:$(date +%s)


  build-frontend:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build ./frontend --tag deeplx-gw:$(date +%s)


  push-backend:

    runs-on: ubuntu-latest

    if: github.event_name == 'push'

    needs: build-backend

    steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    

    - name: Extract metadata (tags)
      id: meta
      run: |
        if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
          VERSION="${{ github.ref_name }}"
        else
          VERSION="${{ github.sha }}"
        fi
        
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        
        # DockerHub tags
        echo "tags_dockerhub=hengbo12345/deeplx-web:latest,hengbo12345/deeplx-web:${VERSION}" >> $GITHUB_OUTPUT
        
        # GHCR tags
        echo "tags_ghcr=ghcr.io/hengbo12345/deeplx-web:latest,ghcr.io/hengbo12345/deeplx-web:${VERSION}" >> $GITHUB_OUTPUT

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ steps.meta.outputs.tags_dockerhub }}
          ${{ steps.meta.outputs.tags_ghcr }}


  release-frontend:

    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/')

    needs: build-frontend

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install and build
      run: |
        cd frontend
        npm ci
        npm run build

    - name: Create dist archive
      run: |
        cd frontend/dist
        tar -czf ../../deeplx-web-frontend-${{ github.ref_name }}.tar.gz *

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: deeplx-web-frontend-*.tar.gz
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
